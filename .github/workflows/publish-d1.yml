name: Publish D1

on:
  push:
    branches:
      - main

concurrency:
  group: publish-d1-main
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest

    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_D1_DATABASE_NAME: ${{ secrets.CLOUDFLARE_D1_DATABASE_NAME }}
      CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
      GITHUB_EVENT_BEFORE: ${{ github.event.before }}
      GITHUB_SHA: ${{ github.sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Validate content
        run: npm run validate:content

      - name: Apply migrations
        run: npx wrangler d1 migrations apply "$CLOUDFLARE_D1_DATABASE_NAME" --remote

      - name: Generate sync SQL
        run: npm run sync:d1:sql > /tmp/agentfirst-d1-sync.sql

      - name: Sync D1 data
        run: npx wrangler d1 execute "$CLOUDFLARE_D1_DATABASE_NAME" --remote --file /tmp/agentfirst-d1-sync.sql

      - name: Compute purge URLs
        run: node ./scripts/compute-purge-urls.mjs /tmp/agentfirst-purge-urls.json

      - name: Purge Cloudflare cache
        run: node ./scripts/purge-cloudflare-cache.mjs /tmp/agentfirst-purge-urls.json
